services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: web
        ENV: ${ENV:-staging}
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
    restart: unless-stopped

  partner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: partner
        ENV: ${ENV:-staging}
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: admin
        ENV: ${ENV:-staging}
    ports:
      - "3003:3000"
    environment:
      - PORT=3000
    restart: unless-stopped
